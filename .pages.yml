media:
  - name: paintings
    label: Изображения — живопись
    input: src/assets/images/paintings
    output: /assets/images/paintings
    extensions: [jpg, jpeg, png, webp]
    categories: [image]
    rename: safe
  - name: drawings
    label: Изображения — графика
    input: src/assets/images/drawings
    output: /assets/images/drawings
    extensions: [jpg, jpeg, png, webp]
    categories: [image]
    rename: safe
  - name: projects
    label: Изображения — проекты
    input: src/assets/images/projects
    output: /assets/images/projects
    extensions: [jpg, jpeg, png, webp]
    categories: [image]
    rename: safe
  - name: objects
    label: Изображения — объекты
    input: src/assets/images/objects
    output: /assets/images/objects
    extensions: [jpg, jpeg, png, webp]
    categories: [image]
    rename: safe
  - name: pages
    label: Изображения — страницы
    input: src/assets/images
    output: /assets/images
    extensions: [jpg, jpeg, png, webp]
    categories: [image]
    rename: safe

components:
  thumbnail_position:
    type: object
    label: Положение миниатюры
    description: "Подберите итоговый кадр в редакторе: https://omanovar.ru/admin/thumbnail/ — затем перенесите сюда X, Y и масштаб. 50 / 50 / 100 — исходный кадр по центру."
    fields:
      - name: x
        label: По горизонтали, %
        type: number
        default: 50
        options:
          min: 0
          max: 100
        description: "0 — левый край, 50 — центр, 100 — правый край."
      - name: y
        label: По вертикали, %
        type: number
        default: 50
        options:
          min: 0
          max: 100
        description: "0 — верхний край, 50 — центр, 100 — нижний край."
      - name: zoom
        label: Масштаб, %
        type: number
        default: 100
        options:
          min: 100
          max: 300
        description: "100 — без увеличения, 200 — увеличение в два раза."

content:
  - name: works
    label: Работы
    type: group
    items:
      - name: paintings
        label: Живопись
        type: collection
        path: src/content/paintings
        format: yaml-frontmatter
        exclude: [paintings.11tydata.js, .DS_Store]
        filename: "{fields.year}-{title}.md"
        view:
          fields: [title, year, series, materials, order]
          primary: title
          sort: [year, series, order, title]
          search: [title, series, materials, description]
          default:
            sort: year
            order: desc
        fields:
          - name: title
            label: Название
            type: string
            required: true
          - name: year
            label: Год
            type: number
            required: true
          - name: dimensions
            label: Размеры
            type: string
            description: "Например: 51 × 49 см"
          - name: materials
            label: Материалы
            type: string
            description: "Например: холст, масло"
          - name: series
            label: Серия работ
            type: string
            description: "Необязательное название серии, например: Праздник"
          - name: description
            label: Описание
            type: text
          - name: description_en
            label: Описание на английском
            type: text
          - name: image
            label: Основное изображение
            type: image
            required: true
            description: Используется первым на странице работы и как обложка, если миниатюра не задана.
            options:
              media: paintings
              rename: safe
          - name: gallery
            label: Дополнительные изображения
            type: image
            description: Можно выбрать несколько фотографий. Они показываются по порядку в карусели вместе с основным изображением.
            options:
              media: paintings
              multiple:
                max: 20
              unique: true
              rename: safe
          - name: thumbnail
            label: Миниатюра
            type: image
            description: Если поле пустое, сайт использует основное изображение.
            options:
              media: paintings
              rename: safe
          - name: thumbnail_position
            component: thumbnail_position
          - name: order
            label: Порядок
            type: number
            default: 0
            description: Основной приоритет сортировки. Чем меньше число, тем раньше работа показывается; при одинаковом порядке более новая работа идёт раньше.
          - name: body
            label: Дополнительный текст страницы
            type: rich-text
            options:
              format: markdown
              media: paintings
              rename: safe

      - name: drawings
        label: Графика
