            type: string
            required: true
          - name: year
            label: Год
            type: number
            required: true
          - name: dimensions
            label: Размеры
            type: string
            description: "Например: 51 × 49 см"
          - name: materials
            label: Материалы
            type: string
            description: "Например: бумага, тушь"
          - name: series
            label: Серия работ
            type: string
            description: "Необязательное название серии, например: Организм"
          - name: description
            label: Описание
