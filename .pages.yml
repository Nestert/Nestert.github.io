          - name: body
            label: Дополнительный текст страницы
            type: rich-text
            options:
              format: markdown
              media: objects
              rename: safe

  - name: work_order
    label: Порядок работ и серий
    type: file
    path: src/_data/work-order.json
    format: json
    operations:
      delete: false
      rename: false
    fields:
      - name: series
        label: Серии в «Проектах»
        type: string
        list: true
        description: Перетаскивайте названия за маркер слева. Название должно совпадать с полем «Серия работ»; новые серии добавляйте в список вручную.
      - name: projects
        label: Ручные проекты
        type: reference
        list: true
        description: Перетаскивайте строки за маркер слева. Ручные проекты показываются после автоматических серий.
        options:
          collection: projects
          value: "{path}"
          label: "{primary} — {fields.year}"
      - name: paintings
        label: Живопись
        type: reference
        list: true
        description: Перетаскивайте строки за маркер слева. Новую работу добавьте в список через кнопку «Добавить элемент».
        options:
          collection: paintings
          value: "{path}"
          label: "{primary} — {fields.year}"
      - name: drawings
        label: Графика
        type: reference
        list: true
        description: Перетаскивайте строки за маркер слева. Новую работу добавьте в список через кнопку «Добавить элемент».
        options:
          collection: drawings
          value: "{path}"
          label: "{primary} — {fields.year}"
      - name: objects
        label: Объекты
        type: reference
        list: true
        description: Перетаскивайте строки за маркер слева. Новую работу добавьте в список через кнопку «Добавить элемент».
        options:
          collection: objects
          value: "{path}"
          label: "{primary} — {fields.year}"

  - name: pages
    label: Текстовые страницы
    type: group
    items:
      - name: cv
        label: Биография
        type: file
        path: src/cv.md
        format: yaml-frontmatter
        operations:
          delete: false
          rename: false
        fields:
          - name: title
            label: Заголовок
            type: string
            required: true
          - name: body
            label: Содержимое
            type: rich-text
            options:
              format: markdown
              media: pages
              rename: safe
      - name: press
        label: СМИ
        type: file
        path: src/press.md
        format: yaml-frontmatter
        operations:
          delete: false
          rename: false
        fields:
          - name: title
            label: Заголовок
            type: string
            required: true
          - name: body
            label: Содержимое
            type: rich-text
            options:
              format: markdown
              media: pages
              rename: safe

  - name: series_covers
    label: Обложки серий
    type: file
    path: src/_data/series-covers.json
    format: json
    list: true
    operations:
      delete: false
      rename: false
    fields:
      - name: name
        label: Название серии
        type: string
        required: true
        description: Должно совпадать с полем «Серия работ». Регистр и лишние пробелы не учитываются.
      - name: image
        label: Обложка
        type: image
        required: true
        options:
          media: projects
          rename: safe
      - name: thumbnail_position
        component: thumbnail_position
        label: Положение обложки
      - name: order
        label: Порядок
        type: number
        default: 0
        required: true
        description: Основной приоритет сортировки. Чем меньше число, тем раньше серия показывается; при одинаковом порядке более новая серия идёт раньше.

settings:
  hide: true
  content:
    merge: true
  commit:
    identity: user
    templates:
      create: "feat(content): add {path}"
      update: "chore(content): update {path}"
      delete: "chore(content): delete {path}"
      rename: "chore(content): rename {oldPath} to {newPath}"
