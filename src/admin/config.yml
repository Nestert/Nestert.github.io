backend:
  name: git-gateway
  branch: main

media_folder: "src/assets/images"
public_folder: "/assets/images"

slug:
  encoding: "unicode"
  clean_accents: true

collections:
  - name: "pages"
    label: "Страницы"
    files:
      - name: "index"
        label: "Главная страница"
        file: "src/index.njk"
        fields:
          - {label: "Биография", name: bio, widget: text, required: false, hint: "2–3 предложения, отображаются на главной странице"}

  - name: "paintings"
    label: "Живопись"
    folder: "src/content/paintings/"
    create: true
    slug: "{{year}}-{{slugify title}}"
    media_folder: "../../assets/images/paintings"
    public_folder: "/assets/images/paintings"
    fields:
      - {label: "Название", name: "title", widget: "string"}
      - {label: "Год", name: "year", widget: "number"}
      - {label: "Описание", name: "description", widget: "text", required: false}
      - {label: "Описание (английский)", name: "description_en", widget: "text", required: false}
      - {label: "Изображение", name: "image", widget: "image", required: true}
      - {label: "Миниатюра", name: "thumbnail", widget: "image", required: false}
      - {label: "Порядок", name: "order", widget: "number", default: 0}
      - {label: "Текст страницы", name: "body", widget: "markdown", required: false}

  - name: "drawings"
    label: "Графика"
    folder: "src/content/drawings/"
    create: true
    slug: "{{year}}-{{slugify title}}"
    media_folder: "../../assets/images/drawings"
    public_folder: "/assets/images/drawings"
    fields:
      - {label: "Название", name: "title", widget: "string"}
      - {label: "Год", name: "year", widget: "number"}
      - {label: "Описание", name: "description", widget: "text", required: false}
      - {label: "Описание (английский)", name: "description_en", widget: "text", required: false}
      - {label: "Изображение", name: "image", widget: "image", required: true}
      - {label: "Миниатюра", name: "thumbnail", widget: "image", required: false}
      - {label: "Порядок", name: "order", widget: "number", default: 0}
      - {label: "Текст страницы", name: "body", widget: "markdown", required: false}

  - name: "projects"
    label: "Проекты"
    folder: "src/content/projects/"
    create: true
    slug: "{{year}}-{{slugify title}}"
    media_folder: "../../assets/images/projects"
    public_folder: "/assets/images/projects"
    fields:
      - {label: "Название", name: "title", widget: "string"}
      - {label: "Год", name: "year", widget: "number"}
      - {label: "Описание", name: "description", widget: "text", required: false}
      - {label: "Описание (английский)", name: "description_en", widget: "text", required: false}
      - {label: "Изображение", name: "image", widget: "image", required: true}
      - {label: "Миниатюра", name: "thumbnail", widget: "image", required: false}
      - {label: "Порядок", name: "order", widget: "number", default: 0}
      - {label: "Текст страницы", name: "body", widget: "markdown", required: false}
